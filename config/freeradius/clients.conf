# clients.conf — authorized RADIUS clients

# Loopback — healthcheck
client localhost {
    ipaddr   = 127.0.0.1
    secret   = ${radius_health_secret}
    shortname = localhost
    nas_type  = other
}

# Docker bridge — testing container and load generator
client docker_internal {
    ipaddr   = ${radius_net_subnet}
    secret   = ${radius_secret}
    shortname = docker_internal
    nas_type  = other
}

$INCLUDE clients.d/