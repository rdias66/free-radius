# =============================================================
# radiusd.conf — FreeRADIUS 3.2.7 main configuration
# Reference: https://github.com/FreeRADIUS/freeradius-server/blob/v3.2.x/raddb/radiusd.conf.in
# =============================================================

prefix        = /usr
exec_prefix   = /usr
sysconfdir    = /etc
localstatedir = /var
sbindir       = ${exec_prefix}/sbin
logdir        = /var/log/freeradius
raddbdir      = /etc/freeradius
radacctdir    = ${logdir}/radacct
name          = radiusd
confdir       = ${raddbdir}
modconfdir    = ${confdir}/mods-config
certdir       = ${confdir}/certs
cadir         = ${confdir}/certs
run_dir       = ${localstatedir}/run/${name}
db_dir        = ${raddbdir}
libdir        = /usr/lib/freeradius
pidfile       = ${run_dir}/${name}.pid
correct_escapes = true

# Runtime values resolved by entrypoint-local.sh
$INCLUDE ${confdir}/local.conf
max_request_time = 30
cleanup_delay  = 5
max_requests   = 16384
hostname_lookups = no

# =============================================================
# Logging
# SECURITY: auth_badpass logs passwords in cleartext on reject.
# Leave off in production unless actively debugging.
# =============================================================
log {
    destination   = stdout
    colourise     = yes
    file          = ${logdir}/radius.log
    syslog_facility = daemon
    auth          = yes
    auth_badpass  = no
    auth_goodpass = no
    msg_denied    = "Access denied"
    suppress_secrets = yes
}

# =============================================================
# Security
# SECURITY: reject_delay slows brute-force attacks by adding
# a 1-second pause before sending Access-Reject.
# max_attributes protects against malformed-packet DoS.
# Reference: RFC 2865 §3 (shared secret), RFC 2866 §4
# =============================================================
security {
    user  = freerad
    group = freerad
    allow_core_dumps = no
    max_attributes   = 200
    reject_delay     = 1
    status_server    = yes
}

# =============================================================
# Thread pool
# num_workers injected from RADIUS_WORKERS env var via .env.
# See .env.example for per-tier sizing guidance.
# =============================================================
thread pool {
    num_networks      = 1
    num_workers       = ${radius_workers}
    # start_servers must be present — the mschap module references
    # ${thread[pool].start_servers} internally. Without it FreeRADIUS
    # will fail with "Reference not found" on startup.
    start_servers     = 5
    min_spare_servers = 3
    max_spare_servers = 10
    max_servers       = 32
    max_requests_per_server = 0
    auto_limit_acct   = no
}

modules {
    $INCLUDE mods-enabled/
}

# Policy block — defines acct_unique and related accounting policies.
# The policy{} wrapper is required: FreeRADIUS 3.2 policy files use
# ${policy.X} variable references and if-blocks that are only valid
# inside a policy execution context, not at the top-level config scope.
policy {
    $INCLUDE policy.d/accounting
}

$INCLUDE sites-enabled/

$INCLUDE clients.conf