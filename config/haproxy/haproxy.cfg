# =============================================================
# haproxy.cfg — UDP load balancer for FreeRADIUS replicas
# HAProxy 3.0 (March 2026)
# Profile: ha — active only when RADIUS_REPLICAS > 1
#
# SECURITY NOTES
#   HAProxy is the sole owner of ports 1812/1813 on the host
#   when this profile is active. Ensure freeradius service
#   does NOT also publish those ports (use override file).
#   Source-IP hash is MANDATORY for EAP session affinity.
#   Without it, multi-packet EAP exchanges (PEAP, EAP-TLS)
#   will randomly fail as packets split across replicas.
#
# Reference: https://www.haproxy.org/download/3.0/doc/configuration.txt
# EAP affinity: RFC 3748 §2.2 (stateful multi-round exchanges)
# =============================================================

global
    log stdout format raw local0
    maxconn 50000
    tune.bufsize 32768

defaults
    log global
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# =============================================================
# Authentication — port 1812 UDP
# Balance: source — hashes NAS source IP to a backend.
# Same NAS always routes to same FreeRADIUS replica.
# This is the EAP session affinity guarantee.
# =============================================================
frontend radius_auth
    bind *:1812 proto udp
    default_backend freeradius_auth

backend freeradius_auth
    balance source
    hash-type consistent
    server-template freeradius 1-8 freeradius:1812 check inter 10s proto udp

# =============================================================
# Accounting — port 1813 UDP
# Accounting is stateless — any backend can receive any packet.
# Roundrobin is fine here; source hash is still safe.
# =============================================================
frontend radius_acct
    bind *:1813 proto udp
    default_backend freeradius_acct

backend freeradius_acct
    balance source
    hash-type consistent
    server-template freeradius 1-8 freeradius:1813 check inter 10s proto udp

# =============================================================
# Stats (internal monitoring)
# SECURITY: Bind to 127.0.0.1 only. Change password.
# Access: http://localhost:8404/stats
# =============================================================
frontend stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:CHANGE_ME_stats_password
    stats hide-version
