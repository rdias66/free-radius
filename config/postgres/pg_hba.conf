# =============================================================
# pg_hba.conf — PostgreSQL client authentication
#
# SECURITY: scram-sha-256 is required. Do not use md5 or trust.
# Only the compose bridge subnet (172.28.0.0/16) is permitted.
# Replication connections are restricted to the same subnet.
# Reference: https://www.postgresql.org/docs/16/auth-pg-hba-conf.html
# =============================================================

# TYPE   DATABASE    USER     ADDRESS             METHOD
local    all         all                          peer
host     radius      radius   172.28.0.0/16       scram-sha-256
host     replication radius   172.28.0.0/16       scram-sha-256
